<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Neon Tiles Anthology</title>
    <style>
        :root { --neon: #ff2d55; }
        body {
            margin:0; overflow:hidden; background:#000;
            font-family: -apple-system, system-ui;
            touch-action:none; user-select:none; -webkit-user-select:none;
        }
        canvas { position:fixed; width:100vw; height:100vh; }
        
        #ui {
            position:absolute; top:40px; width:100%; text-align:center;
            color:#fff; z-index:10; pointer-events:none;
        }
        #score { font-size: 40px; font-weight:900; }

        #menu, #countdown {
            position:absolute; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; background:rgba(0,0,0,0.95);
            color:#fff; z-index:20; text-align:center;
        }
        
        #countdown { font-size:100px; display:none; background:rgba(0,0,0,0.8); }

        .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        button {
            padding:15px 40px; font-size:18px; border:none; border-radius:12px;
            background: #222; color:white; font-weight:bold;
            border: 2px solid var(--neon); transition: 0.2s;
        }
        button:active { background: var(--neon); transform: scale(0.95); }

        .desc { font-size: 12px; opacity: 0.6; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="score">0</div>
</div>

<div id="countdown">3</div>

<canvas id="game"></canvas>

<div id="menu">
    <h1>NEON TILES</h1>
    <p>Choisissez votre scénario :</p>
    
    <div class="btn-group">
        <button onclick="setupGame('sunset')">1. NEON SUNSET
            <div class="desc">Synthwave - Normal</div>
        </button>
        <button onclick="setupGame('lofi')" style="border-color: #00f2ff;">2. MIDNIGHT LO-FI
            <div class="desc">Chill - Facile</div>
        </button>
        <button onclick="setupGame('cyber')" style="border-color: #7cfc00;">3. CYBER GLITCH
            <div class="desc">Techno - Difficile</div>
        </button>
    </div>
</div>

<audio id="musicPlayer" loop crossorigin="anonymous"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const music = document.getElementById("musicPlayer");
const scoreEl = document.getElementById("score");

let tiles = [], score = 0, isPlaying = false;
let speed = 4, accel = 0.001, hue = 0;
let laneWidth, tileH;

const scenarios = {
    sunset: { url: "https://cdn.pixabay.com/download/audio/2022/10/25/audio_7a1c1c0c7d.mp3", speed: 4.5, accel: 0.0012, color: 330 },
    lofi: { url: "https://www.chosic.com/wp-content/uploads/2021/07/Rainy-Day-Chill-Lofi.mp3", speed: 3, accel: 0.0005, color: 220 },
    cyber: { url: "https://www.chosic.com/wp-content/uploads/2021/04/Electronic-Future-Beat.mp3", speed: 6, accel: 0.002, color: 120 }
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    laneWidth = canvas.width / 4;
    tileH = canvas.height / 4.5;
}
window.addEventListener("resize", resize);
resize();

function setupGame(type) {
    const s = scenarios[type];
    music.src = s.url;
    speed = s.speed;
    accel = s.accel;
    hue = s.color;
    
    // iPhone Audio Unlock
    music.play().then(() => music.pause()); 
    
    document.getElementById("menu").style.display = "none";
    score = 0;
    scoreEl.innerText = score;
    startCountdown();
}

function startCountdown() {
    const cd = document.getElementById("countdown");
    cd.style.display = "flex";
    let count = 3;
    cd.innerText = count;

    let timer = setInterval(() => {
        count--;
        if(count > 0) cd.innerText = count;
        else if(count === 0) cd.innerText = "GO!";
        else {
            clearInterval(timer);
            cd.style.display = "none";
            isPlaying = true;
            music.play();
            for(let i=0; i<5; i++) spawnTile(-i * tileH);
            loop();
        }
    }, 700);
}

function spawnTile(yPos) {
    tiles.push({ lane: Math.floor(Math.random()*4), y: yPos, tapped: false });
}

window.addEventListener("touchstart", e => {
    if(!isPlaying) return;
    const x = e.touches[0].clientX;
    const lane = Math.floor(x / laneWidth);
    let activeTiles = tiles.filter(t => !t.tapped).sort((a,b) => b.y - a.y);
    let target = activeTiles[0];

    if(target && lane === target.lane && target.y + tileH > -50) {
        target.tapped = true;
        score++;
        scoreEl.innerText = score;
    } else {
        gameOver();
    }
});

function loop() {
    if(!isPlaying) return;
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width, canvas.height);

    speed += accel; // Accélération propre au scénario

    ctx.strokeStyle = "rgba(255,255,255,0.05)";
    for(let i=1; i<4; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, canvas.height); ctx.stroke();
    }

    for(let i = tiles.length - 1; i >= 0; i--) {
        let t = tiles[i];
        t.y += speed;

        if(!t.tapped) {
            ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
            ctx.fillRect(t.lane * laneWidth + 5, t.y, laneWidth - 10, tileH - 10);
        }

        if(!t.tapped && t.y > canvas.height) {
            gameOver(); return;
        }
    }

    if(tiles.length > 0 && tiles[0].y > canvas.height) {
        tiles.shift();
        spawnTile(tiles[tiles.length-1].y - tileH);
    }
    requestAnimationFrame(loop);
}

function gameOver() {
    isPlaying = false;
    music.pause();
    document.getElementById("menu").style.display = "flex";
    document.querySelector("h1").innerText = "SCORE : " + score;
}
</script>
</body>
</html>
