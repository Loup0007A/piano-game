<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Neon Rhythm Fixed</title>
    <style>
        :root { --neon: #ff2d55; }
        body {
            margin:0; overflow:hidden; background:#000;
            font-family: -apple-system, system-ui;
            touch-action:none; user-select:none; -webkit-user-select:none;
        }
        canvas { position:fixed; width:100vw; height:100vh; }
        #ui {
            position:absolute; top:60px; width:100%; text-align:center;
            color:#fff; z-index:10; pointer-events:none;
        }
        #score { font-size: 50px; font-weight:900; text-shadow: 0 0 10px var(--neon); }
        #best { font-size: 14px; opacity: 0.8; }

        #startScreen, #countdown {
            position:absolute; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; background:rgba(0,0,0,0.95);
            color:#fff; z-index:20; text-align:center; padding: 20px;
        }
        #countdown { background:rgba(0,0,0,0.7); font-size:100px; display:none; }
        
        button {
            padding:20px 50px; font-size:24px; border:none; border-radius:50px;
            background:var(--neon); color:white; font-weight:bold;
            box-shadow: 0 0 20px var(--neon);
        }
        .ios-hint { margin-top: 20px; font-size: 12px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="ui">
    <div id="best">RECORD: 0</div>
    <div id="score">0</div>
</div>

<div id="countdown">3</div>
<canvas id="game"></canvas>

<div id="startScreen">
    <h1>NEON TILES</h1>
    <p>Touchez les tuiles pour créer la musique</p>
    <button id="startBtn">JOUER</button>
    <p class="ios-hint">Vérifiez que le mode <b>Silencieux</b> de votre iPhone est désactivé.</p>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");

let tiles = [], score = 0, isPlaying = false;
let speed = 4, hue = 0;
let laneWidth, tileH;
let audioCtx = null;

// Record
let highScore = localStorage.getItem("neonBest") || 0;
bestEl.innerText = "RECORD: " + highScore;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    laneWidth = canvas.width / 4;
    tileH = canvas.height / 4.5;
}
window.addEventListener("resize", resize);
resize();

// --- LOGIQUE AUDIO IPHONE ---
function unlockAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    // Créer un buffer silencieux pour "débloquer" le haut-parleur
    const buffer = audioCtx.createBuffer(1, 1, 22050);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
}

function playNote(lane) {
    if (!audioCtx || audioCtx.state !== 'running') return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    // Fréquences : Do, Ré, Mi, Sol (Pentatonique, ça sonne toujours bien)
    const freqs = [261.63, 293.66, 329.63, 392.00];
    
    osc.type = 'sine'; // Son plus doux
    osc.frequency.setValueAtTime(freqs[lane], audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

// --- INITIALISATION JEU ---
const startBtn = document.getElementById("startBtn");
const init = (e) => {
    e.preventDefault();
    unlockAudio(); // CRITIQUE pour iPhone
    
    document.getElementById("startScreen").style.display = "none";
    score = 0; speed = 4; tiles = []; hue = 0;
    scoreEl.innerText = score;
    startCountdown();
};

startBtn.addEventListener("click", init);
startBtn.addEventListener("touchend", init);

function startCountdown() {
    const cd = document.getElementById("countdown");
    cd.style.display = "flex";
    let count = 3;
    cd.innerText = count;

    let timer = setInterval(() => {
        count--;
        if(count > 0) cd.innerText = count;
        else if(count === 0) cd.innerText = "GO!";
        else {
            clearInterval(timer);
            cd.style.display = "none";
            isPlaying = true;
            for(let i=0; i<5; i++) spawnTile(-i * tileH);
            loop();
        }
    }, 700);
}

function spawnTile(yPos) {
    tiles.push({ lane: Math.floor(Math.random()*4), y: yPos, tapped: false });
}

window.addEventListener("touchstart", e => {
    if(!isPlaying) return;
    
    // Re-tenter de resume l'audio si Safari l'a coupé
    if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

    const x = e.touches[0].clientX;
    const lane = Math.floor(x / laneWidth);
    let activeTiles = tiles.filter(t => !t.tapped).sort((a,b) => b.y - a.y);
    let target = activeTiles[0];

    if(target && lane === target.lane && target.y + tileH > -50) {
        target.tapped = true;
        score++;
        scoreEl.innerText = score;
        playNote(lane);
    } else {
        gameOver();
    }
}, {passive: false});

function loop() {
    if(!isPlaying) return;
    
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width, canvas.height);

    speed += 0.0015;
    hue = (hue + 1) % 360;
    let currentColor = `hsl(${hue}, 100%, 60%)`;

    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    for(let i=1; i<4; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, canvas.height); ctx.stroke();
    }

    for(let i = tiles.length - 1; i >= 0; i--) {
        let t = tiles[i];
        t.y += speed;

        if(!t.tapped) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = currentColor;
            ctx.fillStyle = currentColor;
            ctx.fillRect(t.lane * laneWidth + 5, t.y, laneWidth - 10, tileH - 10);
            ctx.shadowBlur = 0;
        }

        if(!t.tapped && t.y > canvas.height) {
            gameOver(); return;
        }
    }

    if(tiles.length > 0 && tiles[0].y > canvas.height) {
        tiles.shift();
        spawnTile(tiles[tiles.length-1].y - tileH);
    }

    requestAnimationFrame(loop);
}

function gameOver() {
    isPlaying = false;
    if(score > highScore) {
        highScore = score;
        localStorage.setItem("neonBest", highScore);
        bestEl.innerText = "RECORD: " + highScore;
    }
    document.getElementById("startScreen").style.display = "flex";
    document.querySelector("h1").innerText = "SCORE : " + score;
    document.getElementById("startBtn").innerText = "REESAYER";
}
</script>
</body>
</html>
