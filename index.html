<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Neon Tiles Rhythm</title>

    <style>
        :root { --neon: #ff2d55; --cyan: #00f2ff; }
        body {
            margin:0; overflow:hidden; background:#000;
            font-family: -apple-system, system-ui;
            touch-action:none; user-select:none; -webkit-user-select:none;
        }
        canvas { position:fixed; width:100vw; height:100vh; }

        #ui {
            position:absolute; top:60px; width:100%; text-align:center;
            color:var(--neon); z-index:10; pointer-events:none;
            transition: transform 0.1s ease-out; /* Pour l'effet de beat */
        }
        #score { font-size: 50px; font-weight:900; display:block; }
        #level { font-size: 18px; color:#fff; letter-spacing:2px; }

        #startScreen, #countdown {
            position:absolute; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; background:rgba(0,0,0,0.9);
            color:#fff; z-index:20;
        }
        #countdown { background:rgba(0,0,0,0.6); font-size:100px; display:none; color:var(--cyan); }
        
        button {
            padding:20px 50px; font-size:24px; border:none; border-radius:50px;
            background:var(--neon); color:white; font-weight:bold;
            box-shadow: 0 0 20px var(--neon);
        }
    </style>
</head>
<body>

<div id="ui">
    <span id="level">NIVEAU 1</span>
    <span id="score">0</span>
</div>

<div id="countdown">3</div>

<canvas id="game"></canvas>

<div id="startScreen">
    <h1 style="margin-bottom:30px">NEON TILES</h1>
    <button id="startBtn">START</button>
</div>

<audio id="music" loop crossorigin="anonymous">
    <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_7a1c1c0c7d.mp3?filename=arcade-music-loop-125071.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const music = document.getElementById("music");
const scoreEl = document.getElementById("score");
const levelEl = document.getElementById("level");
const uiContainer = document.getElementById("ui");

let tiles = [], score = 0, level = 1, speed = 5, isPlaying = false;
let laneWidth, tileH;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    laneWidth = canvas.width / 4;
    tileH = canvas.height / 4.5;
}
window.addEventListener("resize", resize);
resize();

// 📱 iPhone Audio Unlock
const startBtn = document.getElementById("startBtn");
startBtn.addEventListener("touchend", (e) => { e.preventDefault(); initGame(); });
startBtn.addEventListener("click", initGame);

function initGame() {
    document.getElementById("startScreen").style.display = "none";
    score = 0; level = 1; speed = 5; tiles = [];
    scoreEl.innerText = score;
    levelEl.innerText = "NIVEAU 1";
    
    // Reset Musique
    music.playbackRate = 1.0; 
    music.currentTime = 0;
    
    startCountdown();
}

function startCountdown() {
    const cd = document.getElementById("countdown");
    cd.style.display = "flex";
    let count = 3;
    cd.innerText = count;

    let timer = setInterval(() => {
        count--;
        if(count > 0) cd.innerText = count;
        else if(count === 0) cd.innerText = "GO!";
        else {
            clearInterval(timer);
            cd.style.display = "none";
            isPlaying = true;
            music.play();
            // Créer premières tuiles
            for(let i=0; i<5; i++) spawnTile(-i * tileH);
            loop();
        }
    }, 800);
}

function spawnTile(yPos) {
    tiles.push({ lane: Math.floor(Math.random()*4), y: yPos, tapped: false });
}

// 👆 Input iPhone (Fast Response)
window.addEventListener("touchstart", e => {
    if(!isPlaying) return;
    const x = e.touches[0].clientX;
    const lane = Math.floor(x / laneWidth);

    let activeTiles = tiles.filter(t => !t.tapped).sort((a,b) => b.y - a.y);
    let target = activeTiles[0];

    if(target && lane === target.lane && target.y + tileH > 0) {
        target.tapped = true;
        score++;
        scoreEl.innerText = score;
        
        // Effet visuel de "beat" sur le clic
        uiContainer.style.transform = "scale(1.1)";
        setTimeout(() => uiContainer.style.transform = "scale(1)", 100);

        // SYNC MUSIQUE : Augmente tous les 10 points
        if(score % 10 === 0) {
            level++;
            speed += 0.7;
            levelEl.innerText = "NIVEAU " + level;
            // On accélère la musique de 5% par niveau
            music.playbackRate = Math.min(2, 1 + (level - 1) * 0.05);
        }
    } else {
        gameOver();
    }
}, {passive: false});

function loop() {
    if(!isPlaying) return;
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // Fond & Lignes
    ctx.strokeStyle = "#222";
    for(let i=1; i<4; i++) {
        ctx.beginPath(); ctx.moveTo(i*laneWidth, 0); ctx.lineTo(i*laneWidth, canvas.height); ctx.stroke();
    }

    for(let i = tiles.length - 1; i >= 0; i--) {
        let t = tiles[i];
        t.y += speed;

        ctx.fillStyle = t.tapped ? "#111" : (score % 20 > 10 ? "#fff" : "#00f2ff");
        ctx.fillRect(t.lane * laneWidth + 2, t.y, laneWidth - 4, tileH - 4);

        if(!t.tapped && t.y > canvas.height - 50) {
            gameOver(); return;
        }
    }

    if(tiles[0].y > canvas.height) {
        tiles.shift();
        spawnTile(tiles[tiles.length-1].y - tileH);
    }

    requestAnimationFrame(loop);
}

function gameOver() {
    isPlaying = false;
    music.pause();
    document.getElementById("startScreen").style.display = "flex";
    document.querySelector("h1").innerText = "SCORE : " + score;
    document.getElementById("startBtn").innerText = "RETRY";
}
</script>
</body>
</html>
