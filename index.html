<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Neon Tiles</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:system-ui;touch-action:none;}
canvas{position:fixed;width:100vw;height:100vh;}

#ui{
position:absolute;top:20px;width:100%;text-align:center;
color:#ff2d55;font-size:48px;font-weight:bold;
}

#startScreen{
position:absolute;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;background:#000;color:#fff;
}

button{
padding:14px 30px;font-size:20px;border:none;border-radius:12px;
background:#ff2d55;color:white;
}
</style>
</head>

<body>

<div id="ui"><span id="score">0</span></div>
<canvas id="game"></canvas>

<div id="startScreen">
<h1>Neon Tiles 🎹</h1>
<button id="startBtn">PLAY</button>
</div>

<!-- 🎵 MUSIQUE RÉELLE (loop) -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/25/audio_7a1c1c0c7d.mp3?filename=arcade-music-loop-125071.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let tiles=[],score=0,speed=0,laneWidth,isPlaying=false;
const h=180;

const music=document.getElementById("music");

// 📱 resize
function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
laneWidth=canvas.width/4;
}
addEventListener("resize",resize);resize();

// 🎮 START FIX (iPhone safe)
document.getElementById("startBtn").addEventListener("click",startGame);
document.getElementById("startBtn").addEventListener("touchend",startGame);

function startGame(e){
if(e) e.preventDefault();

tiles=[];score=0;speed=0;
document.getElementById("score").innerText=0;

for(let i=0;i<6;i++){
tiles.push({
lane:Math.floor(Math.random()*4),
y:innerHeight-i*h,
tapped:false
});
}

document.getElementById("startScreen").style.display="none";

// 🔊 MUSIQUE START (important iOS)
music.currentTime=0;
music.volume=0.5;
music.play().catch(()=>{});

isPlaying=true;
loop();
}

// 👆 input FIX iOS
addEventListener("touchend",e=>{
if(!isPlaying)return;

let x=e.changedTouches[0].clientX;
let lane=Math.floor(x/laneWidth);

let lowest=tiles.filter(t=>!t.tapped).sort((a,b)=>b.y-a.y)[0];

if(!lowest)return;

if(lane===lowest.lane){
lowest.tapped=true;
score++;
document.getElementById("score").innerText=score;

if(speed===0)speed=6;
speed+=0.09;
}else{
gameOver();
}
});

function loop(){
if(!isPlaying)return;

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=1;i<4;i++){
ctx.beginPath();
ctx.moveTo(i*laneWidth,0);
ctx.lineTo(i*laneWidth,canvas.height);
ctx.strokeStyle="#222";
ctx.stroke();
}

for(let t of tiles){
t.y+=speed;

ctx.fillStyle=t.tapped?"#333":"#fff";
ctx.fillRect(t.lane*laneWidth,t.y,laneWidth,h);

if(!t.tapped&&t.y>canvas.height){
gameOver();return;
}
}

if(tiles[0].y>canvas.height){
tiles.shift();
tiles.push({
lane:Math.floor(Math.random()*4),
y:tiles[tiles.length-1].y-h,
tapped:false
});
}

requestAnimationFrame(loop);
}

function gameOver(){
isPlaying=false;
music.pause();

document.getElementById("startScreen").style.display="flex";
document.querySelector("button").innerText="RETRY";
}
</script>

</body>
</html>
